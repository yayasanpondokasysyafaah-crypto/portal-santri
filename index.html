<!DOCTYPE html>
<html lang="id">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Portal Santri</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<body class="login-body">
    
<div class="login-container">

        <!-- LOGO -->
    <div class="logo-container">
        <img src="logo_pndok_2-removebg-preview.png" alt="Logo Pesantren">
    </div>

<h2>Login Portal Santri</h2>


<input id="username" placeholder="NIS">

<div class="input-group">
  <input type="password" id="password" placeholder="Password">
  <span class="toggle-password" onclick="togglePassword()">
    <i class="fas fa-eye"></i>
  </span>
</div>

<p class="buat-akun" onclick="buatAkun()">
Belum punya akun? <span>Buat Akun</span>
</p>


<button onclick="login()" class="login-btn">Login</button>

</div>

<script type="module" src="js/login.js"></script>

<script>
function togglePassword() {
  const input = document.getElementById("password");
  const icon = document.querySelector(".toggle-password i");

  if (input.type === "password") {
    input.type = "text";
    icon.classList.remove("fa-eye");
    icon.classList.add("fa-eye-slash");
  } else {
    input.type = "password";
    icon.classList.remove("fa-eye-slash");
    icon.classList.add("fa-eye");
  }
}
</script>

</body>
</html>
